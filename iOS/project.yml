name: Fragrancelog
options:
  bundleIdPrefix: com.shimondeitel.perfumelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Fragrancelog:
    type: application
    platform: iOS
    sources:
      - path: Fragrancelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.perfumelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Fragrancelog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FragrancelogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FragrancelogTests
      - path: Fragrancelog.storekit
    dependencies:
      - target: Fragrancelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.perfumelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FragrancelogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FragrancelogUITests
    dependencies:
      - target: Fragrancelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.perfumelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Fragrancelog:
    build:
      targets:
        Fragrancelog: all
        FragrancelogTests: [test]
        FragrancelogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Fragrancelog.storekit
    test:
      config: Debug
      storeKitConfiguration: Fragrancelog.storekit
      targets:
        - FragrancelogTests
        - FragrancelogUITests
    archive:
      config: Release
